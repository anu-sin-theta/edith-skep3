name: Publish to npm

on:
  # Trigger on version tags — e.g. git tag v2.4.1 && git push --tags
  push:
    tags:
      - 'v*.*.*'

  # Dry-run check on PRs to main (no actual publish)
  pull_request:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build & test (runs on every trigger)
  # ──────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript → dist/)
        run: npm run build

      - name: Verify binary is executable
        run: |
          if [ ! -x dist/index.js ]; then
            echo "❌ dist/index.js is not executable"
            exit 1
          fi
          echo "✅ dist/index.js is executable"

      - name: Dry-run pack (verify package contents)
        run: npm pack --dry-run

      # Upload dist as artifact so the publish job can use it
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ──────────────────────────────────────────────
  # Job 2: Publish to npm (only on version tags)
  # ──────────────────────────────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    # Only run this job when a version tag is pushed
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read
      id-token: write  # Required for npm provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20 (with npm registry auth)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Download built dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Restore executable bit on binary
        run: chmod +x dist/index.js

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          echo "Package version : $PKG_VERSION"
          echo "Git tag         : $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch — update package.json before tagging"
            exit 1
          fi
          echo "✅ Versions match"

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
